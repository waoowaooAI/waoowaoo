services:
  postgres:
    image: postgres:16-alpine
    container_name: ivibemovie-test-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ivibemovie_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ivibemovie_test"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
