services:
  app:
    build: .
    container_name: ivibemovie-app
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://postgres:aM5BwzzLRtuXx34@156.239.242.28:25432/ivibemovie?schema=public"
      STORAGE_TYPE: local
      NEXTAUTH_URL: "http://localhost:3533"
      NEXTAUTH_SECRET: "ivibemovie-default-secret-2026"
      CRON_SECRET: "ivibemovie-docker-cron-secret"
      INTERNAL_TASK_TOKEN: "ivibemovie-docker-task-token"
      API_ENCRYPTION_KEY: "ivibemovie-opensource-fixed-key-2026"
      WATCHDOG_INTERVAL_MS: "30000"
      TASK_HEARTBEAT_TIMEOUT_MS: "90000"
      QUEUE_CONCURRENCY_IMAGE: "50"
      QUEUE_CONCURRENCY_VIDEO: "50"
      QUEUE_CONCURRENCY_VOICE: "20"
      QUEUE_CONCURRENCY_TEXT: "50"
      LOG_UNIFIED_ENABLED: "true"
      LOG_LEVEL: "INFO"
      LOG_FORMAT: "json"
      LOG_DEBUG_ENABLED: "false"
      LOG_AUDIT_ENABLED: "true"
      LOG_SERVICE: "ivibemovie"
      LOG_REDACT_KEYS: "password,token,apiKey,apikey,authorization,cookie,secret,access_token,refresh_token"
      BILLING_MODE: "OFF"
      LLM_STREAM_EPHEMERAL_ENABLED: "true"
      PG_BOSS_SCHEMA: "pgboss"
    ports:
      - "3533:3533"
    volumes:
      - ./data:/app/data
      - ./docker-logs:/app/logs
    command: >
      sh -c "
        npx prisma db push --skip-generate &&
        (sleep 5 && echo '' &&
        echo '╔══════════════════════════════════════════════════╗' &&
        echo '║            iVibeMovie is ready!                  ║' &&
        echo '║                                                  ║' &&
        echo '║  HTTP:  http://localhost:3533                    ║' &&
        echo '║                                                  ║' &&
        echo '║  For HTTPS, run Caddy on host:                  ║' &&
        echo '║  caddy run --config Caddyfile                   ║' &&
        echo '║  Then open: https://localhost:1443              ║' &&
        echo '╚══════════════════════════════════════════════════╝' &&
        echo '') &
        npm run start
      "
